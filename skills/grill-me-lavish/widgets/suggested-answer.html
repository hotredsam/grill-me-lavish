<!doctype html>
<!--
  grill-me-lavish widget: suggested-answer (formerly strawman)
  Decision type: gut-check on the agent's recommended default. Showing a concrete
  suggested answer and asking accept / tweak / reject extracts a faster, more honest signal
  than an open question — people correct proposals better than they author answers.
  Emits (via window.lavish.queuePrompt options.data):
    { widget: "suggested-answer", question: "...", proposal: "...",
      verdict: "accept" | "tweak" | "reject", reason: "required for tweak/reject" }
  Adapt: edit the CONFIG block — especially CONFIG.proposal, the full suggested answer.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>grill-me-lavish · Suggested answer</title>
<style>
:root{--bg:oklch(0.975 0.006 75);--card:oklch(0.995 0.003 75);--text:oklch(0.22 0.01 50);--muted:oklch(0.42 0.012 50);--accent:oklch(0.52 0.18 18);--border:oklch(0.88 0.008 60);--good:oklch(0.48 0.12 145);--bad:oklch(0.52 0.2 28)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font:16px/1.5 Geist,system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;justify-content:center;padding:32px 16px}
main{width:100%;max-width:680px}
.kicker{font-family:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
h1{font-size:24px;margin:0 0 8px}
.context{color:var(--muted);margin:0 0 16px}
.proposal{background:var(--card);border:1px solid oklch(0.85 0.08 18);border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin:0 0 20px;white-space:pre-wrap}
.proposal .tag{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.verdicts{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.verdicts label{display:block;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 10px;cursor:pointer}
.verdicts label b{display:block;font-size:16px}
.verdicts label span{font-size:12px;color:var(--muted)}
.verdicts input{display:none}
.verdicts label:has(input:checked){border-color:var(--accent);background:oklch(0.96 0.04 18)}
.verdicts label[data-v=accept]:has(input:checked){border-color:var(--good)}
.verdicts label[data-v=reject]:has(input:checked){border-color:var(--bad)}
textarea{width:100%;margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font:14px/1.5 inherit;padding:12px;resize:vertical;min-height:80px}
.reason-hint{font-size:12px;color:var(--muted);margin:6px 0 0}
.reason-hint.needed{color:var(--accent)}
.footer{display:flex;align-items:center;gap:16px;margin-top:20px}
.status{flex:1;font-size:13px;color:var(--muted);margin:0}
.status.sent{color:var(--good)}
button.send{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer}
button.send:disabled{opacity:.4;cursor:not-allowed}
@media (max-width:520px){.verdicts{grid-template-columns:minmax(0,1fr)}}
button.more-qs{background:none;border:1px dashed var(--border);color:var(--muted);border-radius:50px;padding:10px 16px;font-size:13px;cursor:pointer}
button.more-qs:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<main data-lavish-question="suggested-answer">
  <p class="kicker">grill-me-lavish · suggested answer</p>
  <h1 id="question"></h1>
  <p class="context" id="context"></p>
  <div class="proposal"><span class="tag">Agent's suggested answer</span><span id="proposal"></span></div>
  <div class="verdicts">
    <label data-v="accept"><input type="radio" name="verdict" value="accept"><b>✅ Accept</b><span>Do exactly this</span></label>
    <label data-v="tweak"><input type="radio" name="verdict" value="tweak"><b>✏️ Tweak</b><span>Right direction, adjust it</span></label>
    <label data-v="reject"><input type="radio" name="verdict" value="reject"><b>❌ Reject</b><span>Wrong direction</span></label>
  </div>
  <textarea id="reason" placeholder="Your reasoning (required for Tweak or Reject — say what to change or why it's wrong)"></textarea>
  <p class="reason-hint" id="reasonHint"></p>
  <div class="footer">
    <p class="status" id="status">React to the proposal, then send.</p>
    <button class="more-qs" id="moreQs" type="button" title="Tell the agent to go deeper on this topic">＋ More questions</button>
    <button class="send" id="send" disabled>Send verdict to agent</button>
  </div>
</main>
<script>
const CONFIG = {
  question: "Gut-check: does this default work for you?",
  context: "Correcting a concrete proposal is faster and more honest than answering an open question.",
  proposal: "The agent's full recommended default goes here — concrete enough to accept or reject as-is.",
};

document.getElementById("question").textContent = CONFIG.question;
document.getElementById("context").textContent = CONFIG.context;
document.getElementById("proposal").textContent = CONFIG.proposal;

const main = document.querySelector("main");
const reason = document.getElementById("reason");
function state() {
  const checked = main.querySelector('input[name=verdict]:checked');
  return { verdict: checked ? checked.value : null, reason: reason.value.trim() };
}
function refresh() {
  const { verdict, reason: r } = state();
  const needsReason = verdict === "tweak" || verdict === "reject";
  const hint = document.getElementById("reasonHint");
  hint.textContent = needsReason && !r ? "A reason is required for " + verdict + " — it's the whole point." : "";
  hint.className = "reason-hint" + (needsReason && !r ? " needed" : "");
  document.getElementById("send").disabled = !verdict || (needsReason && !r);
}
main.addEventListener("change", refresh);
reason.addEventListener("input", refresh);
refresh();

function markSent(msg) {
  const s = document.getElementById("status");
  s.textContent = msg;
  s.classList.add("sent");
}
document.getElementById("send").addEventListener("click", () => {
  const { verdict, reason: r } = state();
  const summary = "Suggested answer verdict: " + verdict.toUpperCase() + (r ? " — " + r : "");
  const data = { widget: "suggested-answer", question: CONFIG.question, proposal: CONFIG.proposal, verdict, reason: r };
  if (!window.lavish) { console.log("[grill-me-lavish]", summary, data); markSent("No Lavish session — logged to console."); return; }
  window.lavish.queuePrompt(summary, { tag: "grill-answer", text: summary, element: main, data });
  window.lavish.sendQueuedPrompts();
  markSent("Sent ✓ — change your verdict and send again if needed; the agent uses the latest.");
});

document.getElementById("moreQs").addEventListener("click", () => {
  const summary = "User pressed 'More questions' — offer additional, deeper questions on this topic before moving on.";
  const data = { widget: "meta", request: "more-questions", about: CONFIG.question };
  if (!window.lavish) { console.log("[grill-me-lavish]", summary, data); markSent("No Lavish session — logged to console."); return; }
  window.lavish.queuePrompt(summary, { tag: "grill-meta", text: "More questions requested", element: document.querySelector("main"), data });
  window.lavish.sendQueuedPrompts();
  markSent("Asked for more questions ✓ — the agent will dig deeper here.");
});
</script>
</body>
</html>
